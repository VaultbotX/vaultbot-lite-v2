name: Deduplicate Songs

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dedup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: go build -o bin/dedup ./cmd/dedup

      - name: Run
        env:
          POSTGRES_HOST: ${{ secrets.NEON_HOST }}
          POSTGRES_PORT: ${{ secrets.NEON_PORT }}
          POSTGRES_USER: ${{ secrets.NEON_USER }}
          POSTGRES_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          POSTGRES_DB: ${{ secrets.NEON_DB }}
        run: ./bin/dedup
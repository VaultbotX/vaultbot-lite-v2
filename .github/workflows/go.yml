name: Go

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ "web/**" ]
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ "web/**" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

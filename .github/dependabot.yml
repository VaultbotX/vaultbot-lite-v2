# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      jackc-postgres:
        patterns:
          - "github.com/jackc/*"
      golang-x:
        patterns:
          - "golang.org/x/*"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      svelte:
        patterns:
          - "svelte"
          - "svelte-*"
          - "@sveltejs/*"
      vite:
        patterns:
          - "vite"
          - "vitest"
      graphology:
        patterns:
          - "graphology"
          - "graphology-*"
          - "@sigma/*"
          - "sigma"
      chartjs:
        patterns:
          - "chart.js"
          - "chartjs-*"
      typescript-types:
        patterns:
          - "typescript"
          - "@types/*"
      cloudflare:
        patterns:
          - "@cloudflare/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "actions/*"
